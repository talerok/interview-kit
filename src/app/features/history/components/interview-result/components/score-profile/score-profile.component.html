<div class="bars">
  @for (row of _rows(); track row.label) {
    <div class="bar-row" [class.bar-row--empty]="!row.hasScore">
      <div class="bar-row__label">
        <span class="bar-row__dot" [style.background]="row.color"></span>
        <span class="bar-row__name">{{ row.label }}</span>
      </div>
      <div class="bar-row__track">
        <div
          class="bar-row__fill"
          [style.inline-size.%]="row.percent"
          [style.background]="row.color"
        ></div>
      </div>
      <span class="bar-row__value">{{ row.value }}</span>
    </div>
  }

  <div class="bars__scale" aria-hidden="true">
    <span class="bars__scale-spacer"></span>
    <div class="bars__scale-track">
      @for (n of _scale; track n) {
        <span class="bars__scale-tick">{{ n }}</span>
      }
    </div>
    <span class="bars__scale-spacer bars__scale-spacer--end"></span>
  </div>
</div>
