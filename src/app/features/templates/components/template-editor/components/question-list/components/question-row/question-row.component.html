<article class="q-row" (click)="_onEdit()" tabindex="0">
  <span class="q-row__num">#{{ (index() + 1).toString().padStart(2, '0') }}</span>
  <div class="q-row__main">
    @if (question(); as q) {
      @if (q.kind === 'coding') {
        <div class="q-row__title">{{ q.title }}</div>
      }
      <div class="q-row__text" [class.q-row__text--clamped]="_isLong() && !_expanded()">
        {{ _previewText() }}
      </div>
    }
    @if (_isLong()) {
      <button type="button" class="q-row__toggle" (click)="_onToggle($event)">
        @if (_expanded()) { Свернуть } @else { Показать полностью }
      </button>
    }
    <div class="q-row__meta">
      @if (_codingLanguage(); as lang) {
        <span class="chip chip--coding">{{ lang }}</span>
      }
      @if (category(); as c) {
        <span
          class="chip"
          [style.color]="c.color"
          [style.background]="'oklch(from ' + c.color + ' l c h / 0.08)'"
        >
          <span class="chip__dot" [style.background]="c.color"></span>{{ c.label }}
        </span>
      } @else {
        <span class="chip chip--muted">
          <span class="chip__dot"></span>Без категории
        </span>
      }
      <span class="q-row__weight" title="Вес вопроса">
        <app-icon name="weight" /> ×{{ question().weight }}
      </span>
    </div>
  </div>
  <button class="q-row__delete" type="button" (click)="_onDelete($event)" aria-label="Удалить">
    <app-icon name="trash" />
  </button>
</article>
